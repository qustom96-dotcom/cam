workflows:
  ios-build:
    name: ios Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    scripts:
      - name: Build IPA without signing
        script: |
          flutter build ios --debug --no-codesign --build-number=1 --extra-gen-snapshot-options="--no-use-integer-division"
    artifacts:
      - build/ios/iphoneos/*.app